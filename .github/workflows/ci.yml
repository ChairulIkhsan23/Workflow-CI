name: MLflow Project CI - Sentimen Analisis Dana

# Trigger workflow
on:
  push:
    branches: [main]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Menampilkan informasi awal job
      - name: Set up job
        run: |
          echo "MLflow Project CI - Chairul Ikhsan"
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      # 2. Mengambil kode dari repository
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # 3. Menyiapkan environment Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
      
      # 3.3 Setup conda environment
      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12.7'
          environment-file: MLProject/conda.yaml
          activate-environment: mlflow-env

      # 4. Memeriksa environment yang sudah siap
      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Environment ready"

      # 5. Menginstall library yang dibutuhkan
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            mlflow==2.19.0 \
            scikit-learn==1.5.2 \
            numpy \
            pandas \
            matplotlib

      # 6. Menjalankan MLflow project (training model)
      - name: Run MLflow project
        run: |
          cd MLProject
          python modelling.py --env-manager=local -P C=1.0 -P max_iter=1000
        env:
          MLFLOW_TRACKING_URI: "file:./mlruns"

      # 7. Mendapatkan run_id dari MLflow run terakhir
      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          RUN_ID=$(mlflow runs list --experiment-id 0 --max-results 1 --order-by start_time desc | grep -oP 'run_id: \K\S+' | head -1)
          if [ -z "$RUN_ID" ]; then
            echo "WARNING: No run found, using fallback"
            RUN_ID="fallback_run_id"
          fi
          echo "LATEST_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest MLflow Run ID: $RUN_ID"
          echo $RUN_ID > MLProject/latest_run_id.txt
        env:
          MLFLOW_TRACKING_URI: "file:./mlruns"

      # 8. Install Python dependencies
      - name: Install Python dependencies
        run: pip install requests

      # 9. Menyimpan hasil training sebagai model artifacts
      - name: Upload model artifacts to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p model_artifacts

          cp MLProject/latest_run_id.txt model_artifacts/ 2>/dev/null || true
          cp MLProject/model.pkl model_artifacts/ 2>/dev/null || true
          cp MLProject/tfidf_vectorizer.pkl model_artifacts/ 2>/dev/null || true
          cp -r MLProject/mlruns model_artifacts/ 2>/dev/null || true

          git add -f model_artifacts/
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "ci: save model artifacts [run=${{ env.LATEST_RUN_ID }}] [$(date +'%Y-%m-%d %H:%M')]"
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. Membangun Docker image dari model yang sudah dilatih
      - name: Build Docker Model
        run: |
          echo "Building Docker image..."
          mlflow models build-docker \
            --model-uri "runs:/${{ env.LATEST_RUN_ID }}/model" \
            --name "chairulikhsan23/sentimen-dana-mlflow:latest" \
            --env-manager local
        env:
          MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/MLProject/mlruns"

      # 11. Login ke Docker Hub menggunakan secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 12. Memberi tag pada Docker image (latest dan commit hash)
      - name: Tag Docker Image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker tag chairulikhsan23/sentimen-dana-mlflow:latest ${{ secrets.DOCKER_USERNAME }}/sentimen-dana-mlflow:latest
          docker tag chairulikhsan23/sentimen-dana-mlflow:latest ${{ secrets.DOCKER_USERNAME }}/sentimen-dana-mlflow:$SHORT_SHA
          echo "DOCKER_TAG=$SHORT_SHA" >> $GITHUB_ENV

      # 13. Push Docker image ke Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/sentimen-dana-mlflow:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sentimen-dana-mlflow:${{ env.DOCKER_TAG }}
          echo "Docker image pushed!"

      # 14. Menampilkan status setelah login Docker Hub (selalu dijalankan)
      - name: Post Log in to Docker Hub
        if: always()
        run: echo "Docker Hub push completed"

      # 15. Menampilkan status environment Python (selalu dijalankan)
      - name: Post Set up Python 3.12.7
        if: always()
        run: echo "Python environment cleanup"

      # 16. Menampilkan status checkout (selalu dijalankan)
      - name: Post Run actions/checkout@v3
        if: always()
        run: echo "Workflow completed"

      # 17. Ringkasan akhir job (selalu dijalankan)
      - name: Complete job
        if: always()
        run: |
          echo "SUMMARY"
          echo "Status: ${{ job.status }}"
          echo "RUN ID: ${{ env.LATEST_RUN_ID }}"
          echo "Timestamp: $(date +'%Y-%m-%d %H:%M:%S')"
          echo "Docker Image: ${{ secrets.DOCKER_USERNAME }}/sentimen-dana-mlflow:latest"